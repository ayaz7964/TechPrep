<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TechPrep 2026 — Interview Readiness</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <div class="sidebar-header">
        <h1>TechPrep 2026</h1>
        <p class="subtitle">Full Stack Interview Readiness</p>
        <div class="progress-ring-container">
          <svg viewBox="0 0 36 36" class="progress-ring">
            <path class="ring-bg" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
            <path class="ring-fill" id="progress-ring-fill" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" />
          </svg>
          <span id="progress-percent" class="progress-text">0%</span>
        </div>
      </div>
      <nav id="category-nav">
        <!-- Categories rendered by JS -->
      </nav>
    </aside>

    <main id="content">
      <div id="welcome-screen" class="content-panel">
        <div class="welcome-content">
          <span class="welcome-icon">🚀</span>
          <h2>Welcome to TechPrep 2026</h2>
          <p>Select a category from the sidebar to begin mastering interview topics.</p>
          <div class="quick-stats">
            <div class="stat-card">
              <span class="stat-number" id="total-topics">0</span>
              <span class="stat-label">Topics</span>
            </div>
            <div class="stat-card">
              <span class="stat-number" id="completed-count">0</span>
              <span class="stat-label">Completed</span>
            </div>
            <div class="stat-card">
              <span class="stat-number" id="categories-count">0</span>
              <span class="stat-label">Categories</span>
            </div>
          </div>
        </div>
      </div>

      <div id="topic-view" class="content-panel" style="display:none;">
        <div class="topic-header">
          <div>
            <span id="topic-breadcrumb" class="breadcrumb"></span>
            <h2 id="topic-title"></h2>
          </div>
          <div class="topic-meta">
            <span id="topic-difficulty" class="difficulty-badge"></span>
            <span id="topic-time" class="time-badge"></span>
            <label class="completed-toggle">
              <input type="checkbox" id="mark-completed" />
              <span>Mark Completed</span>
            </label>
          </div>
        </div>

        <div class="topic-body">
          <nav class="topic-tabs">
            <button class="tab active" data-section="tldr">TL;DR</button>
            <button class="tab" data-section="layman">Layman Definition</button>
            <button class="tab" data-section="deepdive">Deep Dive</button>
            <button class="tab" data-section="interview">Interview Q&A</button>
            <button class="tab" data-section="diagram">Diagram</button>
            <button class="tab" data-section="code">Code Examples</button>
            <button class="tab" data-section="mcq">Assessment</button>
          </nav>

          <!-- TLDR -->
          <section id="sec-tldr" class="tab-content active">
            <div class="section-card tldr-card">
              <div class="tldr-content" id="tldr-content"></div>
            </div>
          </section>

          <!-- Layman -->
          <section id="sec-layman" class="tab-content">
            <div class="section-card">
              <div class="section-icon">🧑‍🏫</div>
              <p id="layman-content"></p>
            </div>
          </section>

          <!-- Deep Dive -->
          <section id="sec-deepdive" class="tab-content">
            <div class="section-card">
              <div id="deepdive-content"></div>
            </div>
          </section>

          <!-- Interview Q&A -->
          <section id="sec-interview" class="tab-content">
            <div id="interview-list"></div>
          </section>

          <!-- Diagram -->
          <section id="sec-diagram" class="tab-content">
            <div class="diagram-container">
              <div id="diagram-content"></div>
            </div>
          </section>

          <!-- Code -->
          <section id="sec-code" class="tab-content">
            <div id="code-examples"></div>
          </section>

          <!-- MCQ -->
          <section id="sec-mcq" class="tab-content">
            <div id="mcq-container">
              <div id="mcq-questions"></div>
              <button id="mcq-submit" class="btn-primary">Submit Answers</button>
              <div id="mcq-result"></div>
            </div>
          </section>
        </div>
      </div>
    </main>
  </div>

  <script src="data/javascript/topics-data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
